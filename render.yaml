services:
  - type: cron
    name: burundijobs-alert
    env: python
    schedule: "0 */3 * * *"   # toutes les 3 heures
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
